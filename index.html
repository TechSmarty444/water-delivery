<!DOCTYPE html>
<html>
<head>
  <title>RBR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f5f9ff;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    h1 {
      color: #0077cc;
      font-size: 28px;
      margin-top: 20px;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 350px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .price {
      font-size: 22px;
      color: #0077cc;
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 95%;
      padding: 14px;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }

    .whatsapp {
      background: #25D366;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>💧 RBR AGENCIES</h1>
  <p>20L Drinking Packaged Water Delivered to Your Door</p>

  <div class="card">
    <div class="price">₹60 per can</div>

    <input type="number" id="qty" placeholder="Number of cans" oninput="updateTotal()">
    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="address" placeholder="Your Address">
    <p id="total">Total: ₹0</p>
    <button onclick="orderNow()">🚀 Order Now</button>
    <button class="whatsapp" onclick="orderNow()">📲 Order via WhatsApp</button>
  </div>

</div>

<script>
function orderNow() {
  let qty = document.getElementById("qty").value;
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;

  if (!qty || !name || !address) {
    alert("Please fill all details!");
    return;
  }

  let message = `Order Details:%0AName: ${name}%0AAddress: ${address}%0AQuantity: ${qty} cans`;

  let phone = "918714032228"; // replace with your number

  window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}

function updateTotal() {
  let qty = document.getElementById("qty").value;
  let price = 50;

  let total = qty * price;

  document.getElementById("total").innerText = "Total: ₹" + (total || 0);
}
</script>

</body>
</html>
